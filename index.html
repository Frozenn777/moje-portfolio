<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #1a1a1a;
            color: #00ffcc;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        img {
            width: 200px;
            border-radius: 50%; /* To zrobi kółko ze zdjęcia */
            border: 5px solid #00ffcc;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Witaj na mojej stronie!</h1>
    <p>Uczę się programowania na GitHubie.</p>
    
    <!-- PONIŻEJ LINIA ODPOWIEDZIALNA ZA ZDJĘCIE -->
    <img src="kimmich3.jpg" alt="kimmich3.jpg">
    
<script>
    const image = document.querySelector('img');
    image.onclick = function() {
        // Losujemy kolor tła
        const randomColor = Math.floor(Math.random()*16777215).toString(16);
        document.body.style.backgroundColor = "#" + randomColor;
        alert("Kolor tła zmieniony! 🚀");
    };
</script>

</body>
</html>
